name: Daily MLB Handicapper

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-handicapper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install --no-cache-dir pandas==2.2.2

      - name: Create output folder
        run: mkdir -p output

      - name: Run MLB handicapper
        run: python mlb_handicapper.py

      - name: List output files
        run: ls -la output

      - name: Upload best bets CSV
        uses: actions/upload-artifact@v4
        with:
          name: mlb-best-bets
          path: ./output/*.csv
          retention-days: 30
